syntax = "proto3";

package monitoring;

option go_package = "zhacked.me/oxyl/protocol/v1/monitoring";

message GeneralMetrics {
  uint64 cpu_usage = 1;
  uint64 memory_usage = 2;
  uint64 uptime = 3;
}

message MountedDiskMetrics {
  string mount_point = 1;
  uint64 used_space = 2;
}

message PhysicalDiskMetrics {
  string disk_path = 1;
  optional uint32 health_used = 2;
  // represents the lower part of the media errors
  optional uint64 media_errors_1 = 3;
  // represents the upper part of the media errors
  optional uint64 media_errors_2 = 4;

  optional uint64 error_rate = 5;

  optional uint32 pending_sectors = 6;
}

message NetworkMetrics {
  string interface_name = 1;

  uint64 bytes_sent_rate = 2;
  uint64 bytes_received_rate = 3;

  uint64 packets_sent_rate = 4;
  uint64 packets_received_rate = 5;

  uint64 bytes_sent = 6;
  uint64 bytes_received = 7;

  uint64 packets_sent = 8;
  uint64 packets_received = 9;
}

message AgentMetrics {
  GeneralMetrics general_metrics = 1;
  repeated MountedDiskMetrics disk_metrics = 2;
  repeated PhysicalDiskMetrics physical_disk_metrics = 3;
  repeated NetworkMetrics network_metrics = 4;
}

message AgentMetricsResponse {
  bool success = 1;
  optional string error_message = 2;
}




